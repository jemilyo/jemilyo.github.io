<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault ⭑｡𖦹°‧. Closet Liquidation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --hot-pink: #FF85A2;
            --soft-pink: #FFD1DC;
            --white-pink: #FFF0F3;
            --dark-pink: #8E3A4D;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--white-pink);
            background-image: radial-gradient(#FFD1DC 1.5px, transparent 1px);
            background-size: 20px 20px;
            color: var(--dark-pink);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 35px;
            border-radius: 40px;
            border: 2px solid var(--soft-pink);
            box-shadow: 15px 15px 0px var(--soft-pink);
            margin-top: 40px;
        }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; text-align: center; font-size: 2.5rem; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.8rem; margin-bottom: 25px; letter-spacing: 1px; }

        /* Goal Tracker */
        .goal-container {
            margin-bottom: 20px;
            background: var(--white-pink);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--soft-pink);
        }
        .goal-text { font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 12px; background: white; border-radius: 10px; overflow: hidden; border: 1px solid var(--soft-pink); }
        .progress-fill { width: 0%; height: 100%; background: var(--hot-pink); transition: width 0.5s ease; }

        /* Dashboard */
        .dashboard {
            text-align: center;
            background: var(--white-pink);
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            border: 1px dashed var(--hot-pink);
        }
        .big-number { font-size: 2.8rem; font-weight: bold; color: var(--hot-pink); font-family: 'Playfair Display', serif; }

        /* Inputs */
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.75rem; text-transform: uppercase; }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 2px solid var(--soft-pink);
            outline: none;
            font-family: inherit;
            color: var(--dark-pink);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--dark-pink);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background: var(--hot-pink); transform: translateY(-2px); }
        .btn-secondary { background: var(--soft-pink); color: var(--dark-pink); margin-top: 20px; }

        .ai-box {
            margin-top: 25px;
            background: white;
            border: 2px solid var(--soft-pink);
            padding: 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* Inventory List */
        .inventory-list { margin-top: 30px; }
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 0.9rem; 
            padding: 12px 0; 
            border-bottom: 1px solid var(--white-pink); 
        }
        .delete-btn {
            background: none;
            border: none;
            color: var(--hot-pink);
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 10px;
            transition: 0.2s;
        }
        .delete-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Vault .ೀ</h1>
        <p class="subtitle">⭑｡𖦹°‧. CLOSET LIQUIDATION AUDIT .ೀ</p>

        <div class="goal-container">
            <div class="goal-text">
                <span>Next Goal: Save $500 for a Prada Bag ⭑</span>
                <span id="goalPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progressBar" class="progress-fill"></div>
            </div>
        </div>

        <div class="dashboard">
            <div id="totalValue" class="big-number">$0.00</div>
            <p style="font-size: 0.7rem; font-weight: bold;">TOTAL LIQUIDATION ASSETS ⋆˚꩜｡</p>
        </div>

        <div class="input-group">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Vintage Coach Bag">
        </div>

        <div class="input-group">
            <label>Purchase Price ($)</label>
            <input type="number" id="itemPrice" placeholder="200">
        </div>

        <div class="input-group">
            <label>Brand Tier</label>
            <select id="itemTier">
                <option value="0.10">Fast Fashion (10% Market Value)</option>
                <option value="0.40">Mid-Tier (40% Market Value)</option>
                <option value="0.70">Luxury (70% Market Value)</option>
            </select>
        </div>

        <button class="btn" onclick="addItem()">Add to Assets ⭑</button>

        <div class="ai-box" id="aiResponse">
            <strong>Consultant:</strong> Waiting for your first entry to begin the audit... .ೀ
        </div>

        <div id="inventory" class="inventory-list"></div>

        <button class="btn btn-secondary" onclick="downloadReport()">Download Audit Report ⋆˚꩜｡</button>
    </div>

    <script src="vault.js"></script>

</body>
</html>
