<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | Closet Audit .ೀ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --hot-pink: #FF85A2; --soft-pink: #FFD1DC; --white-pink: #FFF0F3; --dark-pink: #8E3A4D; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--white-pink); background-image: radial-gradient(#FFD1DC 1.5px, transparent 1px); background-size: 20px 20px; color: var(--dark-pink); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 450px; width: 100%; background: white; padding: 35px; border-radius: 40px; border: 2px solid var(--soft-pink); box-shadow: 15px 15px 0px var(--soft-pink); animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-family: 'Playfair Display', serif; font-style: italic; text-align: center; font-size: 2.5rem; margin-bottom: 5px; }
        .directions { font-size: 0.8rem; background: var(--white-pink); padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px dashed var(--hot-pink); }
        .goal-box { background: white; border: 2px solid var(--soft-pink); padding: 20px; border-radius: 25px; margin-bottom: 25px; }
        .bar { width: 100%; height: 14px; background: #eee; border-radius: 10px; overflow: hidden; margin: 12px 0; border: 1px solid var(--soft-pink); }
        .fill { height: 100%; background: var(--hot-pink); width: 0%; transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 15px; border: 2px solid var(--soft-pink); outline: none; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 16px; background: var(--dark-pink); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: var(--hot-pink); transform: scale(1.02); }
        .btn-report { background: white; color: var(--dark-pink); border: 2px solid var(--soft-pink); margin-top: 20px; }
        #totalValue { font-size: 2.8rem; font-family: 'Playfair Display', serif; color: var(--hot-pink); font-weight: bold; margin: 0; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vault .ೀ</h1>
        <div class="directions">
            <strong>How to Audit ⋆˚꩜｡</strong><br>
            1. Set your <strong>Savings Goal</strong> & Price.<br>
            2. Add closet items to calculate "Equity."<br>
            3. Download your Audit Report! ⭑
        </div>
        <div class="goal-box">
            <label style="font-size: 0.7rem; font-weight: bold;">SET SAVINGS GOAL</label>
            <input type="text" id="goalName" placeholder="e.g. Prada Bag">
            <input type="number" id="goalPrice" placeholder="Goal Price (e.g. 500)">
            <div class="bar"><div id="progressBar" class="fill"></div></div>
            <div style="font-size: 0.75rem; display: flex; justify-content: space-between;">
                <span>Saving for: <span id="displayGoalName" style="color: var(--hot-pink);">...</span></span>
                <span id="goalPercent">0%</span>
            </div>
        </div>
        <p id="totalValue">$0.00</p>
        <p style="font-size: 0.7rem; font-weight: bold; text-align: center; margin-top: -10px;">TOTAL CLOSET EQUITY</p>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price Paid ($)">
        <select id="itemTier">
            <option value="0.10">Fast Fashion (10% Value)</option>
            <option value="0.40">Mid-Tier (40% Value)</option>
            <option value="0.70">Luxury (70% Value)</option>
        </select>
        <button onclick="addItem()">Audit Asset ⭑｡𖦹°‧.</button>
        <button class="btn-report" onclick="downloadReport()">Download Audit Report 📄</button>
        <p id="aiResponse" style="text-align: center; font-style: italic; margin-top: 15px; font-size: 0.85rem;"></p>
    </div>
    <script src="vault.js"></script>
</body>
</html>
